services:
  sensor:
    image: ${SENSOR_IMAGE:-ghcr.io/moderepo/gateway-takehome/sensor-simulator:v0.1.3}
    ports:
      - "17000:7000"

  server:
    image: ${SERVER_IMAGE:-ghcr.io/moderepo/gateway-takehome/ingest-server:v0.1.3}
    ports:
      - "18080:8080"

  gateway:
    build:
      context: ./gateway
    environment:
      # `sensor` and `server` are Compose service names on the same network.
      SENSOR_HOST: "sensor"
      SENSOR_PORT: "7000"
      INGEST_HOST: "server"
      INGEST_PORT: "8080"
